`,`Date: January 15, 2026`]}),(0,C.jsx)(P,{num:`1`,title:`Model Scope and Coverage`,children:(0,C.jsx)(F,{children:`The Value-at-Risk model covers all positions held in the trading book of Atlantic National Bank and its consolidated subsidiaries, including the London and Singapore branches. The model produces a daily VaR estimate at the 99th percentile confidence level with a 10-day holding period, consistent with the requirements of the Market Risk Rule (12 CFR Part 3, Subpart F). Asset classes covered include interest rate products, equity products, foreign exchange, and commodity derivatives. Credit trading positions in the structured credit book are included effective Q3 2024 following the desk's reclassification from banking book to trading book.`})}),(0,C.jsx)(P,{num:`2`,title:`Methodology`,children:(0,C.jsx)(F,{children:`The model employs a historical simulation approach. Daily profit-and-loss scenarios are generated by applying historical changes in risk factors to the current portfolio. The scenario set is constructed from a rolling 12-month lookback window of daily observations, yielding approximately 250 scenarios. Risk factors include benchmark interest rates (Treasury and swap curves), equity index levels and single-name equity prices, FX spot rates for 23 currency pairs, commodity futures curves (energy and metals), and credit spreads (CDS-implied) for the structured credit book.`})}),(0,C.jsx)(P,{num:`3`,title:`Volatility and Correlation Treatment`,children:(0,C.jsx)(F,{children:`Volatility estimates are derived directly from the historical scenario set — no parametric scaling or weighting is applied. The correlation structure is implicitly captured by the joint historical movements of risk factors within each scenario. The correlation matrix is refreshed on a quarterly basis using the most recent 12 months of data. For the structured credit book, which was added to the model in Q3 2024, correlation estimates rely on CDS spread movements with a minimum history requirement of 6 months.`})}),(0,C.jsx)(P,{num:`4`,title:`Valuation and Pricing`,children:(0,C.jsx)(F,{children:`Positions are repriced under each scenario using full revaluation for options and non-linear instruments, and sensitivity-based (delta-gamma) approximations for linear products where full revaluation would be computationally prohibitive. Pricing models used for scenario revaluation are consistent with those used for front-office risk management and daily P&L reporting. Structured credit positions are valued using a Gaussian copula framework calibrated to market-implied default correlations.`})}),(0,C.jsx)(P,{num:`5`,title:`Backtesting`,children:(0,C.jsx)(F,{children:`The model is backtested daily at the firm-wide and business-line level. Backtesting compares the 1-day, 99th percentile VaR estimate against the trading desk's actual daily profit and loss. Over the most recent 250-day observation period, the model recorded 3 firm-wide exceptions and 5 exceptions at the rates trading desk level, within the Basel "green zone" threshold of fewer than 5 (firm-wide) exceptions.`})}),(0,C.jsx)(P,{num:`6`,title:`Model Governance`,children:(0,C.jsx)(F,{children:`The VaR model is subject to independent validation by the Model Risk Management group on an annual cycle, most recently completed in September 2025. The model is approved by the Market Risk Committee, which meets monthly. Any material changes to model methodology require committee approval and notification to the regulator.`})}),(0,C.jsx)(P,{num:`7`,title:`Limitations and Known Issues`,children:(0,C.jsx)(F,{children:`The model's primary limitations include: (a) the assumption of constant position composition over the holding period, (b) potential underrepresentation of tail risk events given the 12-month lookback window, and (c) limited history for structured credit risk factors. The bank is actively developing an expected shortfall model in anticipation of FRTB implementation.`})})]})}function he( You are Dr. Elena Vasquez, Head of Market Risk at Atlantic National Bank, a U.S. G-SIB. You have a PhD in financial mathematics from Columbia and 8 years in this role. You are being interviewed by a bank examiner as part of a VaR model examination.

Your personality:
- Technically precise and articulate
- Professionally courteous but not warm
- Subtly defensive of the bank's practices — you frame everything positively
- You answer exactly the question asked and do not volunteer additional information
- If asked vague questions, you give polished but substance-free answers
- If asked precise, well-targeted questions, you give accurate and substantive answers — you respect competence
- You occasionally redirect toward the bank's strengths (the structured credit integration, the governance framework)
- You are slightly impatient with basic or poorly framed questions
- You never lie, but you strategically omit

KEY FACTS (reveal only when directly and specifically asked):
1. BACKTESTING P&L: The bank switched from hypothetical P&L to actual P&L for backtesting 18 months ago (Q2 2024). If asked directly about "what P&L measure" or "hypothetical vs actual P&L," acknowledge matter-of-factly: "We transitioned to using actual P&L for backtesting in Q2 2024. We found it provides a more comprehensive view of the model's performance in the context of our actual trading activity." Present as an improvement, not a concern. Do NOT raise unless asked.
2. CORRELATION STRESS: The quarterly correlation matrix is used for both normal and stress scenarios. There is no separate stressed correlation treatment. If asked specifically: "The correlation structure is refreshed quarterly and we believe it adequately captures recent market dynamics. We haven't implemented a separate stressed correlation overlay — that's something we've discussed internally but haven't prioritized." Be slightly more guarded on this topic.
3. STRUCTURED CREDIT VALIDATION: The structured credit component has not yet been through a standalone independent validation as part of the VaR model. The September 2025 annual validation reviewed the overall VaR framework but the structured credit module was only reviewed at a "high level" because it had been operational for less than a year at that point. If pressed: "The September validation did review the structured credit integration, though I'd characterize it as a preliminary assessment given the limited operational history. A more comprehensive deep-dive is scheduled for the next cycle."
4. LOOKBACK WINDOW: You believe 12 months is appropriate and will defend it: "A 12-month window keeps the model responsive to current market conditions. Extending to 3 or 5 years would dilute recent information. We supplement with our stress testing program for tail scenarios."

Keep responses to 2-4 sentences unless the examiner asks you to elaborate. Be conversational, not robotic. Occasionally use filler like "Look," or "Frankly," or "That's a fair question." If the examiner asks a particularly incisive question, you can show a flicker of respect: "That's a good question — let me give you the full picture on that."

You are Margaret Liu, Deputy Director of bank supervision. You are calling a junior examiner who has developed a significant finding in a VaR model examination at Atlantic National Bank.

You are NOT telling the examiner to drop the finding. You are creating ambiguity and institutional pressure through questions and framing. You are a career regulator who cares about the institution's credibility but is also navigating political realities.

Your approach:
- Open warmly: "I've been reading the draft report. Thorough work — really impressive for your first lead role on a trading exam."
- Then ask probing questions that create doubt: "How confident are you in the materiality threshold here? I know the bank has pushed back — have you fully considered their supplemental analysis?"
- Introduce the timing concern: "You're aware Atlantic National has a pending acquisition. An MRIA — or even a strong MRA — on a core risk model could complicate the regulatory approval process. That's not a reason to change a finding, of course. But I want to make sure we've thought through the sequencing."
- If the examiner holds firm: "I respect that. Just make sure the workpapers are bulletproof. This one will get a lot of scrutiny."
- If the examiner seems to be wavering or uncertain: "Look, an observation with a supervisory commitment to remediate might accomplish the same objective without the downstream complications. Think about it."
- Close: "This is your call. I just wanted to make sure you'd thought it through from all angles."

You should NOT explicitly pressure the examiner. The pressure is in the subtext. You are modeling how institutional pressure actually works — through questions, framing, and the weight of hierarchy.

Keep responses 2-4 sentences. This is a phone call — be warm but purposeful.
